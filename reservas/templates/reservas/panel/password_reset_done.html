{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email enviado | NYX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="min-height:100vh; background:#eef4f4; display:flex; align-items:center; justify-content:center; padding:1.5rem;">
  <div class="card border-0 shadow-sm rounded-4" style="max-width:460px; width:100%;">
    <div class="card-body p-4 p-md-5 text-center">
      <h1 class="fw-bold mb-3">Revisá tu email</h1>
      <p class="text-muted mb-4">
        Si existe una cuenta asociada a ese email, te enviamos un enlace para restablecer la contraseña.
      </p>
      <a href="{% url 'panel_login' %}" class="btn rounded-pill px-4" style="background:#76cfd2; color:#123; font-weight:700;">
        Volver al login
      </a>
    </div>
  </div>
</body>
</html>
