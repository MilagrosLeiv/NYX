{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}NYX{% endblock %}</title>
     
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'reservas/css/styles.css' %}?v=4">
</head>

<body class="nyx-body">

    <nav class="navbar navbar-expand-lg nyx-navbar">
        <div class="container">
            <a class="navbar-brand nyx-brand" href="{% url 'service_list' %}">
                NYX
            </a>

            <div class="ms-auto d-flex gap-2">
                <a href="{% url 'service_list' %}" class="btn btn-sm nyx-nav-btn">
                    Servicios
                </a>
            </div>
        </div>
    </nav>

    <main class="nyx-public-main">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
