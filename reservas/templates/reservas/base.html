{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}NYX{% endblock %}</title>

    <link rel="icon" type="image/x-icon" href="{% static 'reservas/img/favicon.ico' %}">
    <link rel="apple-touch-icon" href="{% static 'reservas/img/apple-touch-icon.png' %}">
     
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'reservas/css/styles.css' %}?v=6">


    {% block extra_css %}{% endblock %}
</head>

<body class="nyx-body d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg nyx-navbar">
        <div class="container">
            {% if salon %}
                <a class="navbar-brand" href="{% url 'service_list' salon.slug %}">
                    NYX
                </a>
            {% else %}
                <a class="navbar-brand" href="{% url 'landing_nyx' %}">
                    NYX
                </a>
            {% endif %}

            {% if not salon %}
                <div class="ms-auto d-flex gap-2">
                    <a href="{% url 'landing_nyx' %}" class="btn btn-sm nyx-btn-outline">
                        Inicio
                    </a>
                </div>
            {% endif %}
        </div>
    </nav>

    <main class="py-2 flex-grow-1">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    {% include "reservas/includes/footer_simple.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}

    <script>
    document.addEventListener("DOMContentLoaded", function () {
      const STORAGE_KEY = "nyxScrollRestore";

      function getPageKey(url) {
        return url.pathname + url.search;
      }

      function saveScrollForUrl(url) {
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify({
          key: getPageKey(url),
          y: window.scrollY,
          createdAt: Date.now()
        }));
      }

      function restoreScroll() {
        const raw = sessionStorage.getItem(STORAGE_KEY);
        if (!raw) return;

        let data;

        try {
          data = JSON.parse(raw);
        } catch (error) {
          sessionStorage.removeItem(STORAGE_KEY);
          return;
        }

        const currentKey = window.location.pathname + window.location.search;
        const isExpired = Date.now() - data.createdAt > 15000;

        if (isExpired || data.key !== currentKey) {
          sessionStorage.removeItem(STORAGE_KEY);
          return;
        }

        requestAnimationFrame(function () {
          window.scrollTo({
            top: Number(data.y) || 0,
            behavior: "instant"
          });

          sessionStorage.removeItem(STORAGE_KEY);
        });
      }

      restoreScroll();

      document.querySelectorAll("a[href]").forEach(function (link) {
        link.addEventListener("click", function () {
          if (link.hasAttribute("data-no-scroll-restore")) {
            sessionStorage.removeItem(STORAGE_KEY);
            return;
          }

          const href = link.getAttribute("href");

          if (!href || href.startsWith("#") || href.startsWith("javascript:")) return;

          const targetUrl = new URL(href, window.location.origin);
          const currentUrl = new URL(window.location.href);

          if (targetUrl.origin !== window.location.origin) return;

          if (targetUrl.pathname !== currentUrl.pathname) {
            sessionStorage.removeItem(STORAGE_KEY);
            return;
          }

          saveScrollForUrl(targetUrl);
        });
      });

      document.querySelectorAll("form").forEach(function (form) {
        form.addEventListener("submit", function () {
          if (form.hasAttribute("data-no-scroll-restore")) return;

          const method = (form.getAttribute("method") || "get").toLowerCase();
          const action = form.getAttribute("action") || window.location.href;
          const targetUrl = new URL(action, window.location.origin);

          if (targetUrl.origin !== window.location.origin) return;

          if (method === "get") {
            const formData = new FormData(form);
            targetUrl.search = new URLSearchParams(formData).toString();
            saveScrollForUrl(targetUrl);
          } else {
            saveScrollForUrl(new URL(window.location.href));
          }
        });
      });
    });
    </script>
</body>
</html>
